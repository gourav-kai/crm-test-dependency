name: User Story
description: Create a new user story
title: "[STORY] "
labels: ["story"]
body:
  - type: input
    id: epic
    attributes:
      label: Epic
      description: Which epic does this story belong to?
    validations:
      required: true
  - type: input
    id: story-id
    attributes:
      label: Story ID
      description: e.g. 1.1
    validations:
      required: true
  - type: dropdown
    id: story-points
    attributes:
      label: Story Points
      options: ["1", "2", "3", "5", "8", "13"]
    validations:
      required: true
  - type: textarea
    id: user-story
    attributes:
      label: User Story
      description: "As a [role], I want [feature] so that [benefit]"
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Given/When/Then format
    validations:
      required: true
  - type: textarea
    id: e2e-coverage
    attributes:
      label: E2E Coverage
      description: Which E2E tests cover this story?
  - type: textarea
    id: dod
    attributes:
      label: Definition of Done
      value: |
        - [ ] Tests written and passing (>=85% coverage)
        - [ ] Code reviewed
        - [ ] Documentation updated
        - [ ] Acceptance criteria verified
