name: Task
description: Create a task or chore
title: "[TASK] "
labels: ["task"]
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options: ["infra", "docs", "refactor", "research", "other"]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true
  - type: textarea
    id: done-when
    attributes:
      label: Done When
      description: Clear completion criteria
    validations:
      required: true
